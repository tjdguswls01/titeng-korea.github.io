<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visa Kernel 3 - EMV Contactless Book C-3</title>
  <style>
    :root {
      --navy: #1A1F71;
      --navy-d: #131650;
      --navy-l: #2B3180;
      --gold: #F7B600;
      --gold-pale: #FFF8DC;
      --bg: #EEF1FA;
      --panel: #FFFFFF;
      --text: #1A1A2E;
      --muted: #5A6280;
      --border: #D8DCF0;
      --shadow: rgba(26,31,113,0.09);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: "Malgun Gothic","Apple SD Gothic Neo",sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app, .stage-wrap, .stage { width: 100vw; height: 100vh; overflow: hidden; }
    .track {
      display: flex;
      width: 100%;
      height: 100%;
      transition: transform .38s cubic-bezier(.4,0,.2,1);
    }
    .slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      padding: 22px 3vw 14px;
      display: grid;
      grid-template-rows: auto minmax(0,1fr) auto;
      gap: 10px;
      background: var(--bg);
    }
    .slide-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 9px;
      border-bottom: 2.5px solid var(--navy);
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px 3px 8px;
      background: var(--navy);
      color: var(--gold);
      font-size: 16.5px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 4px;
    }
    .tag::before {
      content: "";
      width: 5px;
      height: 5px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .pg { font-size: 18px; font-weight: 800; color: var(--navy); opacity: .5; }
    .content { min-height: 0; height: 100%; display: flex; flex-direction: column; gap: 10px; }
    h1,h2,h3,p { margin: 0; }
    h1 {
      font-size: clamp(51px,5.4vw,81px);
      line-height: 1.06;
      letter-spacing: -.03em;
      text-align: center;
      color: var(--navy);
    }
    h2 {
      font-size: clamp(37.5px,3.6vw,57px);
      line-height: 1.16;
      letter-spacing: -.02em;
      text-align: center;
      color: var(--navy);
    }
    h3 {
      font-size: clamp(27px,2.475vw,39px);
      line-height: 1.25;
      color: var(--navy);
      font-weight: 800;
    }
    p, li {
      font-size: clamp(22.5px,2.07vw,31.5px);
      line-height: 1.64;
      color: var(--text);
    }
    ul { margin: 0; padding-left: 20px; display: grid; gap: 5px; }
    .lead {
      font-size: clamp(25.5px,2.4vw,37.5px);
      line-height: 1.6;
      font-weight: 600;
      text-align: center;
      color: var(--muted);
    }
    .g1,.g2,.g3,.hero,.flow,.mat {
      display: grid;
      gap: 10px;
      align-items: stretch;
    }
    .g1   { grid-template-columns: 1fr; }
    .g2   { grid-template-columns: repeat(2, 1fr); }
    .g3   { grid-template-columns: repeat(3, 1fr); }
    .hero { grid-template-columns: 2fr 1fr; }
    .flow { grid-template-columns: repeat(5, 1fr); }
    .mat  { grid-template-columns: repeat(2, 1fr); }
    .grow { flex: 1 1 0; min-height: 0; }
    .stack { display: flex; flex-direction: column; gap: 16px; }
    .card, .note {
      background: var(--panel);
      border: 1px solid var(--border);
      border-top: 3px solid var(--navy);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 2px 10px var(--shadow);
      min-width: 0;
    }
    .card.hi { border-top-color: var(--gold); }
    .card h3 { padding-bottom: 9px; border-bottom: 1px solid var(--border); }
    .note {
      background: linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);
      border-top-color: var(--gold);
      color: #fff;
    }
    .note h3 { color: var(--gold); border-bottom-color: rgba(255,255,255,.15); }
    .note p, .note li { color: rgba(255,255,255,.9); }
    .bar {
      background: linear-gradient(90deg,var(--navy) 0%,var(--navy-l) 100%);
      color: #fff;
      border-radius: 8px;
      padding: 11px 24px;
      font-size: clamp(21px,1.83vw,28.5px);
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
    }
    .bar strong { color: var(--gold); }
    .fbox {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      font-size: clamp(19.5px,1.8vw,27px);
      font-weight: 800;
      color: var(--navy);
      text-align: center;
      position: relative;
      box-shadow: 0 2px 8px var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      min-width: 0;
    }
    .fbox.hi { border-top: 3px solid var(--gold); }
    .fbox::after {
      content: "→";
      position: absolute;
      right: -11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 22px;
      font-weight: 900;
      z-index: 2;
    }
    .fbox:last-child::after { display: none; }
    .fbox .sm {
      font-size: clamp(16.5px,1.47vw,21px);
      color: var(--muted);
      font-weight: 600;
      line-height: 1.3;
    }
    .mat > div {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 11px 14px;
      font-size: clamp(19.5px,1.725vw,25.5px);
      line-height: 1.55;
      box-shadow: 0 1px 5px var(--shadow);
      min-width: 0;
    }
    .mat .mhead { background: var(--navy); color: var(--gold); font-weight: 800; text-align: center; }
    .mat .mrow { background: linear-gradient(135deg,#F0F3FB,#E4E9F5); color: var(--navy); font-weight: 700; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
    .chip {
      padding: 6px 15px;
      border-radius: 999px;
      background: var(--navy);
      color: var(--gold);
      font-size: clamp(18px,1.575vw,24px);
      font-weight: 800;
      letter-spacing: .02em;
    }
    .foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .hint { font-size: 16.5px; color: var(--muted); font-weight: 600; }
    .pbar { flex: 1; margin: 0 14px; height: 3px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .pfill { height: 100%; background: linear-gradient(90deg,var(--navy),var(--gold)); border-radius: 999px; transition: width .38s; }
    .dark { background: linear-gradient(135deg,var(--navy-d) 0%,var(--navy) 55%,#2B3A9C 100%); }
    .dark .slide-head { border-bottom-color: rgba(247,182,0,.35); }
    .dark .tag { background: rgba(247,182,0,.14); border: 1px solid rgba(247,182,0,.32); }
    .dark .pg { color: rgba(255,255,255,.35); }
    .dark h1, .dark h2 { color: #fff; }
    .dark .lead { color: rgba(255,255,255,.72); }
    .dark .chip { background: rgba(255,255,255,.1); border: 1px solid rgba(247,182,0,.38); }
    .dark .bar { background: rgba(247,182,0,.13); border: 1px solid rgba(247,182,0,.3); color: #fff; }
    .dark .foot { border-top-color: rgba(255,255,255,.12); }
    .dark .hint { color: rgba(255,255,255,.38); }
    .dark .pbar { background: rgba(255,255,255,.14); }
    .mini { font-size: clamp(18px,1.47vw,22.5px); line-height: 1.4; color: var(--muted); }
    .warn { color: #c00; font-weight: 700; }
    .note-box { padding: 12px 14px; border-radius: 7px; background: var(--bg); border-left: 3px solid var(--gold); }
    .codebox {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f1535;
      overflow: hidden;
    }
    .codehead {
      padding: 8px 12px;
      background: rgba(247,182,0,.14);
      color: var(--gold);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .03em;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .codebox pre {
      margin: 0;
      padding: 12px 14px;
      overflow: auto;
      max-height: 220px;
      color: #e8ecff;
      font-family: Consolas, "Courier New", monospace;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre;
      tab-size: 4;
    }
    @media (max-width:1280px),(max-height:800px){
      .slide { padding: 16px 2.4vw 12px; gap: 8px; }
      h2 { font-size: clamp(31.5px,3vw,48px); }
      h3 { font-size: clamp(22.5px,2.1vw,33px); }
      p,li { font-size: clamp(19.5px,1.77vw,27px); }
      .bar { font-size: clamp(18px,1.575vw,24px); }
      .card, .note { padding: 13px 16px; }
    }
    @media (max-width:1100px),(max-height:700px){
      .g2   { grid-template-columns: 1fr; }
      .g3   { grid-template-columns: 1fr; }
      .flow { grid-template-columns: 1fr; }
    }
    @media (max-width:900px){
      .hero,.g2,.g3,.flow,.mat { grid-template-columns: 1fr; }
      .fbox::after { display: none; }
    }
  </style>
</head>

  const T = document.getElementById("T");

  function esc(v) {
    return String(v)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function bulletsHtml(list) {
    return `<ul>${list.map(item => `<li>${esc(item)}</li>`).join("")}</ul>`;
  }

  function codeHtml(code, title = "Code") {
    return `<div class="codebox">${title ? `<div class="codehead">${esc(title)}</div>` : ""}<pre><code>${esc(code)}</code></pre></div>`;
  }

  function cardHtml(card) {
    const cls = card.hi ? "card hi" : "card";
    const body = card.stack
      ? `<div class="stack">${card.stack.map(item => `
          <div class="note-box">
            <h3 style="font-size:clamp(15px,1.3vw,21px);margin-bottom:6px;">${esc(item.title)}</h3>
            ${bulletsHtml(item.bullets)}
          </div>
        `).join("")}</div>`
      : `${bulletsHtml(card.bullets)}${card.code ? codeHtml(card.code, card.codeTitle) : ""}`;
    return `<div class="${cls}"><h3>${esc(card.title)}</h3>${body}</div>`;
  }

  function flowHtml(item) {
    return `<div class="fbox${item.hi ? " hi" : ""}">${esc(item.title)}<div class="sm">${esc(item.sm)}</div></div>`;
  }

  function renderSlide(slide, index) {
    const page = `${String(index + 1).padStart(2, "0")} / ${String(slides.length).padStart(2, "0")}`;
    const progress = ((index + 1) / slides.length * 100).toFixed(1);
    const slideClass = `slide${slide.theme === "dark" ? " dark" : ""}`;

    let body = "";
    if (slide.variant === "cover") {
      body = `
        <div class="content">
          <div class="hero grow">
            <div class="card" style="gap:14px;border-top:3px solid var(--gold);background:rgba(255,255,255,.06);border-color:rgba(247,182,0,.25);">
              <h1 style="text-align:left;">${esc(slide.title)}</h1>
              <p class="lead" style="text-align:left;">${esc(slide.lead)}</p>
              <h3 style="font-size:clamp(16px,1.45vw,22px);color:var(--gold);border-bottom:1px solid rgba(247,182,0,.35);padding-bottom:6px;">${esc(slide.cards[0].title)}</h3>
              ${bulletsHtml(slide.cards[0].bullets)}
              <div class="chips" style="justify-content:flex-start;margin-top:6px;">
                ${slide.chips.map(ch => `<span class="chip">${esc(ch)}</span>`).join("")}
              </div>
            </div>
            <div class="note" style="gap:12px;">
              <h3>${esc(slide.cards[1].title)}</h3>
              ${bulletsHtml(slide.cards[1].bullets)}
            </div>
          </div>
          <div class="bar"><strong>핵심:</strong> ${esc(slide.bar)}</div>
        </div>
      `;
    } else if (slide.variant === "closing") {
      body = `
        <div class="content">
          <h2 style="color:var(--gold);">${esc(slide.title)}</h2>
          <p class="lead">${esc(slide.lead)}</p>
          <div class="g2 grow">
            <div class="note" style="gap:12px;">
              <h3>${esc(slide.cards[0].title)}</h3>
              ${bulletsHtml(slide.cards[0].bullets)}
            </div>
            <div class="note" style="gap:12px;">
              <h3>${esc(slide.cards[1].title)}</h3>
              ${bulletsHtml(slide.cards[1].bullets)}
            </div>
          </div>
          <div class="chips" style="margin-top:2px;">
            ${slide.chips.map(ch => `<span class="chip">${esc(ch)}</span>`).join("")}
          </div>
          <div class="bar"><strong>정리:</strong> ${esc(slide.bar)}</div>
        </div>
      `;
    } else if (slide.layout === "flow") {
      body = `
        <div class="content">
          <h2>${esc(slide.title)}</h2>
          <div class="flow grow" style="flex-shrink:0;">
            ${slide.flow.map(flowHtml).join("")}
          </div>
          <div class="bar"><strong>핵심:</strong> ${esc(slide.bar)}</div>
        </div>
      `;
    } else {
      const cardGridClass = slide.cards.length >= 3 ? "g3" : slide.cards.length === 2 ? "g2" : "g1";
      body = `
        <div class="content">
          <h2>${esc(slide.title)}</h2>
          <div class="${cardGridClass} grow">
            ${slide.cards.map(cardHtml).join("")}
          </div>
          <div class="bar"><strong>핵심:</strong> ${esc(slide.bar)}</div>
        </div>
      `;
    }

    return `
      <section class="${slideClass}">
        <div class="slide-head">
          <span class="tag">${esc(slide.tag)}</span>
          <div class="pg">${page}</div>
        </div>
        ${body}
        <div class="foot">
          <span class="hint">Visa Book C-3 v2.10</span>
          <div class="pbar"><div class="pfill" style="width:${progress}%"></div></div>
          <span class="hint">${page}</span>
        </div>
      </section>
    `;
  }

  T.innerHTML = slides.map(renderSlide).join("");

  const slideEls = Array.from(document.querySelectorAll(".slide"));
  let cur = 0;
  function clamp(n) { return Math.max(0, Math.min(n, slideEls.length - 1)); }
  function go(n) {
    cur = clamp(n);
    T.style.transform = `translateX(-${cur * 100}%)`;
  }

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") { e.preventDefault(); go(cur + 1); }
    if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); go(cur - 1); }
    if (e.key === "Home") { e.preventDefault(); go(0); }
    if (e.key === "End") { e.preventDefault(); go(slideEls.length - 1); }
  });

  go(0);
</script>
